services:
  - type: web
    name: petrol-pump-api
    env: python
    plan: free
    region: singapore
    runtime: python-3.11.9

    buildCommand: "pip install -r requirements.txt"

    startCommand: "gunicorn app:app"

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petrol_pump_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: pserv
    name: petrol_pump_db
    plan: free
    region: singapore